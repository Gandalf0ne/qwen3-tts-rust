<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qwen3-TTS WebUI</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #e0e0e0;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #00d4ff;
            text-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
        }
        .card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .card h2 {
            margin-bottom: 16px;
            color: #00d4ff;
            font-size: 1.2em;
        }
        .form-group {
            margin-bottom: 16px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #aaa;
        }
        textarea {
            width: 100%;
            min-height: 100px;
            padding: 12px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.3);
            color: #fff;
            font-size: 16px;
            resize: vertical;
        }
        textarea:focus {
            outline: none;
            border-color: #00d4ff;
            box-shadow: 0 0 10px rgba(0, 212, 255, 0.3);
        }
        select, input[type="number"] {
            width: 100%;
            padding: 10px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.3);
            color: #fff;
            font-size: 14px;
        }
        select:focus, input:focus {
            outline: none;
            border-color: #00d4ff;
        }
        .row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
        }
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .checkbox-group input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
        }
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
        }
        .btn-primary {
            background: linear-gradient(135deg, #00d4ff, #0099cc);
            color: #fff;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 212, 255, 0.4);
        }
        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        .btn-group {
            display: flex;
            gap: 12px;
            margin-top: 16px;
        }
        .status {
            padding: 12px;
            border-radius: 8px;
            margin-top: 16px;
        }
        .status.info {
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid rgba(0, 212, 255, 0.3);
        }
        .status.error {
            background: rgba(255, 82, 82, 0.1);
            border: 1px solid rgba(255, 82, 82, 0.3);
            color: #ff5252;
        }
        .status.success {
            background: rgba(76, 175, 80, 0.1);
            border: 1px solid rgba(76, 175, 80, 0.3);
            color: #4caf50;
        }
        .audio-player {
            margin-top: 16px;
        }
        audio {
            width: 100%;
            margin-top: 8px;
        }
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #00d4ff;
            animation: spin 1s ease-in-out infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .hidden {
            display: none;
        }
        .info-text {
            font-size: 12px;
            color: #888;
            margin-top: 4px;
        }
        .api-info {
            font-family: monospace;
            background: rgba(0, 0, 0, 0.3);
            padding: 12px;
            border-radius: 8px;
            font-size: 13px;
            overflow-x: auto;
        }
        .api-info code {
            color: #00d4ff;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎵 Qwen3-TTS WebUI</h1>

        <div class="card">
            <h2>📝 文本输入</h2>
            <div class="form-group">
                <label for="text">输入要合成的文本：</label>
                <textarea id="text" placeholder="请输入要转换的文本...">你好，这是一个测试。</textarea>
            </div>
        </div>

        <div class="card">
            <h2>⚙️ 参数设置</h2>
            <div class="row">
                <div class="form-group">
                    <label for="speaker">说话人</label>
                    <select id="speaker"></select>
                </div>
                <div class="form-group">
                    <label for="temperature">Temperature</label>
                    <input type="number" id="temperature" value="0.7" min="0" max="2" step="0.1">
                    <div class="info-text">越高越随机，0 为贪婪采样</div>
                </div>
                <div class="form-group">
                    <label for="top_k">Top-K</label>
                    <input type="number" id="top_k" value="40" min="0" max="100" step="1">
                    <div class="info-text">0 表示禁用</div>
                </div>
                <div class="form-group">
                    <label for="top_p">Top-P</label>
                    <input type="number" id="top_p" value="0.9" min="0" max="1" step="0.05">
                    <div class="info-text">1.0 表示禁用</div>
                </div>
            </div>
            <div class="row">
                <div class="form-group">
                    <label for="seed">随机种子</label>
                    <input type="number" id="seed" placeholder="留空为随机">
                    <div class="info-text">相同种子产生相同结果</div>
                </div>
                <div class="form-group">
                    <div class="checkbox-group" style="margin-top: 24px;">
                        <input type="checkbox" id="streaming">
                        <label for="streaming" style="margin-bottom: 0;">启用流式模式</label>
                    </div>
                    <div class="info-text">流式模式适用于 ICL 克隆</div>
                </div>
            </div>
        </div>

        <div class="card">
            <h2>🎵 生成音频</h2>
            <div class="btn-group">
                <button class="btn btn-primary" id="generateBtn" onclick="generateTTS()">
                    生成音频
                </button>
                <button class="btn btn-secondary" id="stopBtn" onclick="stopGeneration()" disabled>
                    停止
                </button>
            </div>
            <div id="status" class="status info hidden"></div>
            <div id="audioContainer" class="audio-player hidden">
                <audio id="audioPlayer" controls></audio>
            </div>
        </div>

        <div class="card">
            <h2>📖 API 使用说明</h2>
            <div class="api-info">
                <p><strong>HTTP API:</strong></p>
                <p>POST <code>/api/tts</code></p>
                <p>Body: <code>{"text": "你好", "speaker": "vivian", "streaming": false}</code></p>
                <br>
                <p><strong>WebSocket API:</strong></p>
                <p>Connect to <code>/api/ws</code></p>
                <p>Send: <code>{"type": "tts", "text": "你好", "speaker": "vivian"}</code></p>
            </div>
        </div>
    </div>

    <script>
        let currentController = null;
        let ws = null;

        async function loadSpeakers() {
            try {
                const response = await fetch('/api/speakers');
                const data = await response.json();
                const select = document.getElementById('speaker');
                select.innerHTML = '';
                data.speakers.forEach(name => {
                    const option = document.createElement('option');
                    option.value = name;
                    option.textContent = name;
                    select.appendChild(option);
                });
            } catch (e) {
                console.error('Failed to load speakers:', e);
            }
        }

        function showStatus(message, type = 'info') {
            const status = document.getElementById('status');
            status.textContent = message;
            status.className = `status ${type}`;
            status.classList.remove('hidden');
        }

        function hideStatus() {
            document.getElementById('status').classList.add('hidden');
        }

        function setGenerating(isGenerating) {
            const generateBtn = document.getElementById('generateBtn');
            const stopBtn = document.getElementById('stopBtn');
            generateBtn.disabled = isGenerating;
            stopBtn.disabled = !isGenerating;
            if (isGenerating) {
                generateBtn.innerHTML = '<span class="loading"></span> 生成中...';
            } else {
                generateBtn.innerHTML = '生成音频';
            }
        }

        async function generateTTS() {
            const text = document.getElementById('text').value.trim();
            if (!text) {
                showStatus('请输入文本', 'error');
                return;
            }

            const speaker = document.getElementById('speaker').value;
            const temperature = parseFloat(document.getElementById('temperature').value) || 0.7;
            const top_k = parseInt(document.getElementById('top_k').value) || 40;
            const top_p = parseFloat(document.getElementById('top_p').value) || 0.9;
            const seed = document.getElementById('seed').value ? parseInt(document.getElementById('seed').value) : null;
            const streaming = document.getElementById('streaming').checked;

            setGenerating(true);
            showStatus('正在生成音频...', 'info');
            document.getElementById('audioContainer').classList.add('hidden');

            currentController = new AbortController();

            try {
                const response = await fetch('/api/tts', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        text,
                        speaker,
                        streaming,
                        temperature,
                        top_k,
                        top_p,
                        seed,
                    }),
                    signal: currentController.signal,
                });

                const data = await response.json();

                if (data.success && data.audio_base64) {
                    const audioData = Uint8Array.from(atob(data.audio_base64), c => c.charCodeAt(0));
                    const blob = new Blob([audioData], { type: 'audio/wav' });
                    const url = URL.createObjectURL(blob);
                    const audioPlayer = document.getElementById('audioPlayer');
                    audioPlayer.src = url;
                    document.getElementById('audioContainer').classList.remove('hidden');
                    showStatus(`生成成功！时长: ${(data.duration_ms / 1000).toFixed(2)}秒`, 'success');
                } else {
                    showStatus(data.message || '生成失败', 'error');
                }
            } catch (e) {
                if (e.name === 'AbortError') {
                    showStatus('已停止生成', 'info');
                } else {
                    showStatus(`错误: ${e.message}`, 'error');
                }
            } finally {
                setGenerating(false);
                currentController = null;
            }
        }

        function stopGeneration() {
            if (currentController) {
                currentController.abort();
            }
            if (ws) {
                ws.close();
                ws = null;
            }
        }

        // Initialize
        loadSpeakers();
    </script>
</body>
</html>
