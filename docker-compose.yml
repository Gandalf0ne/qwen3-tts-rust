services:
  qwen3-tts:
    container_name: qwen3-tts
    image: ghcr.io/gandalf0ne/qwen3-tts-rust:latest
    devices:
      - /dev/dri/renderD128:/dev/dri/renderD128
      - /dev/dri/card0:/dev/dri/card0
    # Verify GIDs on your TrueNAS system: stat -c '%g' /dev/dri/renderD128 /dev/dri/card0
    group_add:
      - '107'
      - '44'
    environment:
      # Force Vulkan for llama.cpp LLM inference
      - QWEN3_TTS_RUNTIME_BACKEND=vulkan
      - QWEN3_TTS_N_GPU_LAYERS=99
      # Linux decoder defaults to Burn/WGPU Vulkan.
      # The encoder and speaker ONNX models use WebGPU (Dawn/Vulkan) by default.
      # Set QWEN3_TTS_ONNX_CPU=1 only if you explicitly want CPU for those ONNX models.
      # - QWEN3_TTS_ONNX_CPU=1
    ports:
      - '3100:3000'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 300s
    restart: unless-stopped
    volumes:
      # Models: GGUF + ONNX files (~4-6 GB, downloaded on first run)
      - /mnt/ssd_speicher/generic/qwen3-tts/models:/app/models:rw
      # Runtime: llama.cpp shared libs (~200 MB, downloaded on first run)
      - /mnt/ssd_speicher/generic/qwen3-tts/runtime:/app/runtime:rw
      # Speakers: voice profiles (optional override of built-in defaults)
      # - /mnt/ssd_speicher/generic/qwen3-tts/speakers:/app/speakers:rw
