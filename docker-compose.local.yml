services:
  qwen3-tts-local:
    container_name: qwen3-tts-local
    build:
      context: .
    image: qwen3-tts-rust:local
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]
              driver: nvidia
              count: all
    devices:
      - /dev/dri/renderD128:/dev/dri/renderD128
      - /dev/dri/card0:/dev/dri/card0
    group_add:
      - '992'
      - '44'
    environment:
      - QWEN3_TTS_RUNTIME_BACKEND=vulkan
      - QWEN3_TTS_N_GPU_LAYERS=99
      # ONNX uses WebGPU (Dawn/Vulkan) by default.
      # Set QWEN3_TTS_ONNX_CPU=1 to force CPU fallback if needed.
      # - QWEN3_TTS_ONNX_CPU=1
    volumes:
      - ./local-data/models:/app/models:rw
      - ./local-data/runtime:/app/runtime:rw
    ports:
      - "3100:3000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 300s
    restart: unless-stopped
